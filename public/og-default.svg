<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C4A3E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E3A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C4A3E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D95D39;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C04525;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Decorative mountain silhouette (background) -->
  <path d="M0 630 L0 350 Q 150 280 300 320 Q 450 360 600 280 Q 750 200 900 260 Q 1050 320 1200 250 L1200 630 Z" fill="rgba(255,255,255,0.03)" />

  <!-- Road decoration -->
  <path d="M0 580 Q 300 520 600 560 Q 900 600 1200 540" stroke="rgba(255,255,255,0.06)" strokeWidth="4" fill="none" />

  <!-- Logo icon (centered) -->
  <!-- Background -->
  <rect x="370" y="100" width="460" height="460" rx="80" fill="#FDFBF7" opacity="0.05" />
  <rect x="400" y="130" width="400" height="400" rx="60" fill="#FDFBF7" />

  <!-- Mountain -->
  <path d="M430 490 C430 490, 520 220, 600 180 C680 220, 770 490, 770 490 Z" fill="#2C4A3E" />

  <!-- Sun -->
  <circle cx="670" cy="280" r="60" fill="url(#sunGrad)" />

  <!-- Snow cap -->
  <path d="M530 260 C550 230, 580 220, 600 210 C620 220, 650 230, 670 260 C640 275, 560 275, 530 260 Z" fill="rgba(255,255,255,0.3)" />

  <!-- Road at base -->
  <rect x="440" y="440" width="320" height="30" rx="8" fill="#D95D39" />

  <!-- Logo text -->
  <text x="600" y="580" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="64" font-weight="900" fill="#FDFBF7" letter-spacing="2">RodaTrip</text>
  <text x="600" y="620" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="rgba(253,251,247,0.7)" letter-spacing="4">PLATFORM ROADTRIP INDONESIA</text>
</svg>
